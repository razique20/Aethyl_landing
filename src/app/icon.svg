<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" />
      <stop offset="50%"  stop-color="#d0dce8" />
      <stop offset="100%" stop-color="#a0aec0" />
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="32" height="32" rx="6" fill="#000000" />

  <!-- Globe outline -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="url(#silver)" stroke-width="1.4" />

  <!-- Meridian (vertical ellipse) -->
  <ellipse cx="16" cy="16" rx="5.5" ry="10" fill="none" stroke="url(#silver)" stroke-width="1.1" />

  <!-- Equator -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="url(#silver)" stroke-width="1.1" />

  <!-- Latitude arcs -->
  <path d="M7.5 11 Q16 13 24.5 11" fill="none" stroke="url(#silver)" stroke-width="1" />
  <path d="M7.5 21 Q16 19 24.5 21" fill="none" stroke="url(#silver)" stroke-width="1" />

  <!-- Network nodes at cardinal points -->
  <circle cx="16" cy="6"  r="1.5" fill="url(#silver)" />
  <circle cx="26" cy="16" r="1.5" fill="url(#silver)" />
  <circle cx="16" cy="26" r="1.5" fill="url(#silver)" />
  <circle cx="6"  cy="16" r="1.5" fill="url(#silver)" />

  <!-- Connection lines between nodes -->
  <line x1="16" y1="6"  x2="26" y2="16" stroke="url(#silver)" stroke-width="0.8" stroke-dasharray="2 1.5" opacity="0.5" />
  <line x1="26" y1="16" x2="16" y2="26" stroke="url(#silver)" stroke-width="0.8" stroke-dasharray="2 1.5" opacity="0.5" />
  <line x1="16" y1="26" x2="6"  y2="16" stroke="url(#silver)" stroke-width="0.8" stroke-dasharray="2 1.5" opacity="0.5" />
  <line x1="6"  y1="16" x2="16" y2="6"  stroke="url(#silver)" stroke-width="0.8" stroke-dasharray="2 1.5" opacity="0.5" />
</svg>
